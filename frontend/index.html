<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CallMint - Connect with Experts</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CallMint" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <script>
      (function() {
        try {
          if (typeof window !== 'undefined' && window.fetch) {
            var currentFetch = window.fetch;
            var defineOn = function(obj) {
              try {
                Object.defineProperty(obj, 'fetch', {
                  configurable: true,
                  enumerable: true,
                  get: function() {
                    return currentFetch;
                  },
                  set: function(value) {
                    console.warn('Intercepted and processed window.fetch override attempt.');
                    currentFetch = value;
                  }
                });
                return true;
              } catch (err) {
                return false;
              }
            };
            var success = defineOn(window);
            if (!success && typeof Window !== 'undefined' && Window.prototype) {
              defineOn(Window.prototype);
            }
          }
        } catch (e) {
          console.error('Early fetch safeguard failed:', e);
        }
      })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered:', reg.scope))
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
