<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0ea5e9" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Ambient background glow -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>
  
  <!-- Base Plate -->
  <circle cx="256" cy="256" r="180" fill="#020617" stroke="url(#skyGrad)" stroke-width="8" filter="url(#shadow)"/>
  
  <!-- Outer Ring Accent -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="12 6" opacity="0.6"/>
  
  <!-- Main Logo (M + Chat/Call symbol) -->
  <g transform="translate(146, 146)">
    <!-- Chat Speech Bubble background -->
    <path d="M 110,30 C 170,30 200,60 200,100 C 200,140 160,170 110,170 C 95,170 70,185 50,195 C 55,175 58,160 54,152 C 28,136 20,115 20,100 C 20,60 50,30 110,30 Z" fill="none" stroke="url(#skyGrad)" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Phone receiver inside or stylized M inside -->
    <path d="M70,80 L95,125 L120,80 L145,125 L170,80" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Sparkle/Glow dots -->
    <circle cx="180" cy="60" r="8" fill="#38bdf8" />
    <circle cx="45" cy="140" r="6" fill="#0ea5e9" />
  </g>
</svg>
